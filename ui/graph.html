<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TachyGraph — Knowledge Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0f; overflow: hidden; }
    #graph { width: 100vw; height: 100vh; }
    #tooltip {
      position: absolute;
      padding: 14px 18px;
      background: rgba(15, 15, 25, 0.96);
      border: 1px solid rgba(100, 160, 255, 0.4);
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 13px;
      max-width: 450px;
      pointer-events: none;
      display: none;
      z-index: 1000;
      backdrop-filter: blur(10px);
      line-height: 1.6;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #tooltip .node-label { color: #6a9fff; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    #tooltip .summary { color: #fff; font-size: 13px; }
    #tooltip .meta { color: #888; font-size: 11px; margin-top: 6px; }
    #controls {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(15, 15, 25, 0.92);
      border: 1px solid rgba(100, 140, 255, 0.2);
      border-radius: 10px;
      padding: 16px 20px;
      color: #ccc;
      font-size: 12px;
      z-index: 100;
      min-width: 220px;
    }
    #controls h3 { color: #6a9fff; margin-bottom: 12px; font-size: 15px; }
    #controls .row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; }
    #controls input[type=range] { width: 100px; }
    #controls .toggle { cursor: pointer; user-select: none; }
    #controls .toggle input { margin-right: 6px; }
    #stats {
      position: absolute;
      bottom: 16px;
      left: 16px;
      color: #555;
      font-size: 11px;
      z-index: 100;
    }
    #legend {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(15, 15, 25, 0.92);
      border: 1px solid rgba(100, 140, 255, 0.2);
      border-radius: 10px;
      padding: 12px 16px;
      color: #ccc;
      font-size: 11px;
      z-index: 100;
    }
    #legend .item { display: flex; align-items: center; margin: 4px 0; }
    #legend .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
  </style>
</head>
<body>
  <div id="graph"></div>
  <div id="tooltip">
    <div class="node-label"></div>
    <div class="summary"></div>
    <div class="meta"></div>
  </div>
  <div id="controls">
    <h3>TachyGraph</h3>
    <div class="row">
      <label class="toggle"><input type="checkbox" id="showSimilarity" checked> Similarity edges</label>
    </div>
    <div class="row" id="thresholdRow">
      <span>Threshold:</span>
      <input type="range" id="threshold" min="0.5" max="0.95" step="0.05" value="0.75">
      <span id="threshVal">0.75</span>
    </div>
    <div class="row">
      <label class="toggle"><input type="checkbox" id="showExplicit" checked> Explicit edges</label>
    </div>
    <div style="border-top:1px solid rgba(100,140,255,0.15);margin-top:10px;padding-top:10px">
      <div class="row"><span style="color:#6a9fff;font-weight:600;font-size:11px">NODE FILTER</span></div>
      <div class="row"><label class="toggle"><input type="checkbox" id="filterQA"> Questions & Answers only</label></div>
    </div>
  </div>
  <div id="legend">
    <div class="item"><div class="dot" style="background:#6a9fff"></div>Summary</div>
    <div class="item"><div class="dot" style="background:#ff6b6b"></div>Project</div>
    <div class="item"><div class="dot" style="background:#ffd93d"></div>Question</div>
    <div class="item"><div class="dot" style="background:#6bff8a"></div>Answer</div>
    <div class="item" style="margin-top:8px; color:#666">— Explicit edge</div>
    <div class="item" style="color:#666">··· Similarity edge</div>
  </div>
  <div id="stats"></div>

  <script src="https://unpkg.com/3d-force-graph@1"></script>
  <script>
    const API = 'http://localhost:8000';
    let PROJECT_ID = null; // null = show all projects
    const tooltip = document.getElementById('tooltip');
    const stats = document.getElementById('stats');

    // Load project list and add selector
    async function loadProjects() {
      const res = await fetch(`${API}/projects`);
      const data = await res.json();
      if (data.projects && data.projects.length > 0) {
        const controls = document.getElementById('controls');
        const sel = document.createElement('select');
        sel.id = 'projectSelect';
        sel.style.cssText = 'width:100%;margin:8px 0;padding:4px;background:#1a1a2e;color:#ccc;border:1px solid rgba(100,140,255,0.3);border-radius:4px;';
        sel.innerHTML = '<option value="">All Projects</option>' +
          data.projects.map(p => `<option value="${p.id}">${p.name} (${p.node_count})</option>`).join('');
        sel.addEventListener('change', e => {
          PROJECT_ID = e.target.value || null;
          loadGraph(parseFloat(document.getElementById('threshold').value));
        });
        controls.appendChild(sel);
      }
    }

    const COLORS = {
      PROJECT: '#ff6b6b',
      SUMMARY: '#6a9fff',
      QUESTION: '#ffd93d',
      ANSWER: '#6bff8a',
    };

    let graphData = { nodes: [], edges: [] };
    let showSimilarity = true;
    let showExplicit = true;
    let filterQA = false;
    let selectedNode = null;
    let neighborSet = new Set();
    let connectedEdges = new Set();

    const graph = ForceGraph3D()(document.getElementById('graph'))
      .backgroundColor('#0a0a0f')
      .nodeColor(n => {
        const hex = COLORS[n.label] || '#888888';
        if (!selectedNode) return hex;
        if (neighborSet.has(n.id)) return hex;
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},0.08)`;
      })
      .nodeVal(n => n.label === 'PROJECT' ? 8 : n.label === 'SUMMARY' ? 5 : 3)
      .nodeOpacity(1.0)
      .nodeLabel(() => '')
      .linkColor(e => {
        if (selectedNode) {
          const src = e.source?.id || e.source, tgt = e.target?.id || e.target;
          if (src === selectedNode.id || tgt === selectedNode.id) {
            return e.label === 'SIMILAR' ? `rgba(100, 200, 255, 0.9)` : 'rgba(255,255,255,0.8)';
          }
          return 'rgba(255,255,255,0.02)';
        }
        return e.label === 'SIMILAR' ? `rgba(100, 160, 255, ${e.weight * 0.6})` : 'rgba(255,255,255,0.15)';
      })
      .linkWidth(e => {
        if (selectedNode) {
          const src = e.source?.id || e.source, tgt = e.target?.id || e.target;
          if (src === selectedNode.id || tgt === selectedNode.id) return e.label === 'SIMILAR' ? e.weight * 3 : 1.5;
          return 0.1;
        }
        return e.label === 'SIMILAR' ? e.weight * 1.5 : 0.4;
      })
      .linkOpacity(0.7)
      .linkDirectionalParticles(e => e.label === 'SIMILAR' ? 0 : 1)
      .linkDirectionalParticleWidth(0.8)
      .onNodeHover(node => {
        document.body.style.cursor = node ? 'pointer' : 'default';
        if (node) {
          tooltip.style.display = 'block';
          tooltip.querySelector('.node-label').textContent = node.label;
          tooltip.querySelector('.summary').textContent = node.summary || 'No summary';
          tooltip.querySelector('.meta').textContent = `Created: ${node.created_at.split(' ')[0]}`;
        } else {
          tooltip.style.display = 'none';
        }
      })
      .onNodeClick(node => {
        if (selectedNode && selectedNode.id === node.id) {
          selectedNode = null;
          neighborSet.clear();
        } else {
          selectedNode = node;
          neighborSet.clear();
          neighborSet.add(node.id);
          const currentLinks = graph.graphData().links;
          currentLinks.forEach(e => {
            const src = e.source?.id || e.source, tgt = e.target?.id || e.target;
            if (src === node.id) neighborSet.add(tgt);
            if (tgt === node.id) neighborSet.add(src);
          });
        }
        graph.nodeColor(graph.nodeColor());
        graph.cameraPosition(
          { x: node.x + 100, y: node.y + 50, z: node.z + 100 },
          { x: node.x, y: node.y, z: node.z },
          800
        );
      })
      .onBackgroundClick(() => {
        if (selectedNode) {
          selectedNode = null;
          neighborSet.clear();
          graph.nodeColor(graph.nodeColor());
        }
      });

    document.addEventListener('mousemove', e => {
      tooltip.style.left = e.clientX + 15 + 'px';
      tooltip.style.top = e.clientY + 15 + 'px';
    });

    function filterEdges() {
      let nodes = graphData.nodes;
      if (filterQA) {
        const qaLabels = new Set(['QUESTION', 'ANSWER']);
        nodes = nodes.filter(n => qaLabels.has(n.label));
      }
      const nodeIds = new Set(nodes.map(n => n.id));
      const links = graphData.edges.filter(e => {
        if (!nodeIds.has(e.source?.id || e.source) || !nodeIds.has(e.target?.id || e.target)) return false;
        if (e.label === 'SIMILAR') return showSimilarity;
        return showExplicit;
      });
      graph.graphData({ nodes, links });
      stats.textContent = `${nodes.length} nodes · ${links.length} edges` + (filterQA ? ' (Q&A only)' : '');
    }

    async function loadGraph(threshold = 0.75) {
      let url = `${API}/graph?similarity_threshold=${threshold}`;
      if (PROJECT_ID) url += `&project_id=${PROJECT_ID}`;
      const res = await fetch(url);
      graphData = await res.json();
      filterEdges();
    }

    document.getElementById('threshold').addEventListener('input', e => {
      document.getElementById('threshVal').textContent = e.target.value;
      loadGraph(parseFloat(e.target.value));
    });

    document.getElementById('showSimilarity').addEventListener('change', e => {
      showSimilarity = e.target.checked;
      document.getElementById('thresholdRow').style.opacity = showSimilarity ? 1 : 0.3;
      filterEdges();
    });

    document.getElementById('showExplicit').addEventListener('change', e => {
      showExplicit = e.target.checked;
      filterEdges();
    });

    document.getElementById('filterQA').addEventListener('change', e => {
      filterQA = e.target.checked;
      filterEdges();
    });

    loadProjects();
    loadGraph();
  </script>
</body>
</html>
