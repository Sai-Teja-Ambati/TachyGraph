listen_addresses = '*'

# Memory (tuned for 800MB container)
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 512MB
wal_buffers = 4MB

# Connections
max_connections = 10

# Planner (SSD-optimized)
random_page_cost = 1.1

# WAL
wal_level = replica
max_wal_size = 256MB
min_wal_size = 64MB

# Logging
log_min_duration_statement = 500
